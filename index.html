<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprite Sheet Tool</title>
  <script type="module">
    import { removeBackground, preload } from 'https://esm.run/@imgly/background-removal@1.7.0';
    window.removeBackground = removeBackground;
    window.preloadRemoveBackground = preload;
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 30px;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }

    .controls-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 10px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-group-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .control-group-row .control-group {
      flex: 1;
      margin-bottom: 0;
    }

    label {
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    input[type="number"],
    input[type="file"],
    select {
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="number"]:focus,
    input[type="file"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: white;
      border: 2px solid #ddd;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
      height: fit-content;
    }

    .checkbox-group:hover {
      border-color: #667eea;
    }

    .checkbox-group input[type="checkbox"] {
      margin: 0;
    }

    .checkbox-group label {
      margin: 0;
      cursor: pointer;
      font-size: 14px;
    }

    .background-removal-group {
      display: none; // this is intentional don't change it
      align-items: flex-end;
      gap: 10px;
      padding: 10px;
      background: white;
      border: 2px solid #ddd;
      border-radius: 5px;
    }

    .background-removal-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .background-removal-checkbox input[type="checkbox"] {
      margin: 0;
    }

    .background-removal-checkbox label {
      margin: 0;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }

    .background-color-select {
      flex: 1;
      display: none;
    }

    .background-color-select.visible {
      display: block;
    }

    .drop-zone {
      border: 3px dashed #667eea;
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      background: #f0f4ff;
      transition: all 0.3s;
      grid-column: 1 / -1;
    }

    .drop-zone:hover {
      background: #e8edff;
      border-color: #764ba2;
    }

    .drop-zone.dragover {
      background: #e8edff;
      border-color: #764ba2;
      transform: scale(1.02);
    }

    .drop-zone p {
      color: #667eea;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .drop-zone small {
      display: block;
      color: #999;
      font-size: 12px;
      margin-top: 8px;
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    .preview-section {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .preview-title {
      font-weight: 600;
      color: #333;
      font-size: 16px;
    }

    .preview-container {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 400px;
      position: relative;
      overflow: auto;
    }

    .preview-container.bg-transparent {
      background: repeating-conic-gradient(#606060 0% 25%, #808080 0% 50%) 50% / 20px 20px;
    }

    .preview-container.bg-black {
      background: #000000;
    }

    .preview-container.bg-white {
      background: #ffffff;
    }

    canvas#previewCanvas {
      image-rendering: pixelated;
      max-width: 100%;
      max-height: 100%;
    }

    .preview-container.stretch canvas#previewCanvas {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .frame-size-section {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 15px;
      background: white;
      border: 2px solid #ddd;
      border-radius: 8px;
      grid-column: 1 / -1;
    }

    .frame-size-control {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .frame-size-control label {
      font-size: 12px;
      font-weight: 600;
    }

    .frame-size-control input {
      padding: 8px;
      font-size: 13px;
    }

    .padding-controls-section {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .padding-controls {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 15px;
      background: white;
      border: 2px solid #ddd;
      border-radius: 8px;
      padding-top: 40px;
      position: relative;
      grid-column: 1 / -1;
    }

    .padding-controls::before {
      content: 'Padding (applied to resized frame)';
      position: absolute;
      top: 8px;
      left: 15px;
      font-weight: 700;
      color: #333;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .padding-control {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .padding-control label {
      font-size: 12px;
      font-weight: 600;
    }

    .padding-control input {
      padding: 8px;
      font-size: 13px;
    }

    .movement-controls {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 15px;
      background: white;
      border: 2px solid #ddd;
      border-radius: 8px;
      padding-top: 40px;
      position: relative;
      grid-column: 1 / -1;
    }

    .movement-controls::before {
      content: 'Eliminate Movement';
      position: absolute;
      top: 8px;
      left: 15px;
      font-weight: 700;
      color: #333;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .movement-control {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .movement-control label {
      font-size: 12px;
      font-weight: 600;
    }

    .movement-control input[type="number"] {
      padding: 8px;
      font-size: 13px;
    }

    .movement-control.full-width {
      grid-column: 1 / -1;
    }

    .movement-toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
    }

    .movement-toggle-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
    }

    .movement-toggle-row label {
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin: 0;
    }

    .slider-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #ddd;
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #5568d3;
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    input[type="range"]::-moz-range-thumb:hover {
      background: #5568d3;
      transform: scale(1.2);
    }

    .slider-label {
      text-align: center;
      font-size: 12px;
      color: #666;
    }

    .info-text {
      text-align: center;
      color: #999;
      font-size: 14px;
    }

    .frames-section {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .frames-label {
      font-weight: 600;
      color: #333;
    }

    .frames-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
      max-height: 500px;
      overflow-y: auto;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 10px;
      border: 2px solid #e0e0e0;
    }

    .frame-item {
      position: relative;
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      border: 3px solid #ddd;
      background: white;
      transition: all 0.2s;
    }

    .frame-item:hover {
      border-color: #667eea;
      transform: scale(1.05);
    }

    .frame-item.excluded {
      opacity: 0.5;
      background: #f0f0f0;
    }

    .frame-item canvas {
      width: 100%;
      height: 80px;
      display: block;
      image-rendering: pixelated;
    }

    .frame-item .frame-number {
      position: absolute;
      top: 2px;
      right: 2px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .frame-item.included {
      border-color: #28a745;
      box-shadow: 0 0 10px rgba(40, 167, 69, 0.3);
    }

    .buttons-section {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 30px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #5a6268;
      transform: translateY(-2px);
    }

    .btn-success {
      background: #28a745;
      color: white;
    }

    .btn-success:hover {
      background: #218838;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    button:disabled:hover {
      background-color: inherit;
    }

    .status-message {
      text-align: center;
      padding: 15px;
      border-radius: 8px;
      font-weight: 500;
      display: none;
    }

    .status-message.show {
      display: block;
    }

    .status-message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status-message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .status-message.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 10px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    .source-type-indicator {
      display: inline-block;
      padding: 4px 8px;
      background: #667eea;
      color: white;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
    }

    .video-element {
      display: none;
    }

    .processing-indicator {
      text-align: center;
      padding: 20px;
      background: #e3f2fd;
      border-radius: 8px;
      color: #1565c0;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: #667eea;
      width: 0%;
      transition: width 0.3s;
    }

    .control-group.disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .fps-controls-group {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .fps-controls-group .control-group {
      flex: 1;
    }

    .bg-removal-processing {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      z-index: 10;
      color: white;
      font-weight: 600;
      gap: 10px;
    }

    .bg-removal-progress {
      width: 80%;
      max-width: 300px;
      height: 8px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      overflow: hidden;
    }

    .bg-removal-progress-fill {
      height: 100%;
      background: #667eea;
      width: 0%;
      transition: width 0.3s;
      border-radius: 4px;
    }

    .bg-removal-text {
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎨 Sprite Sheet Tool</h1>

  <div class="controls-section">
    <div class="drop-zone" id="dropZone" title="Drop or click to upload a sprite sheet image (PNG, JPG, GIF) or a video file (MP4, WebM, OGG). Images will be analyzed to detect frame grid layout automatically.">
      <p>📁 Drop your sprite sheet or video here or click to browse</p>
      <small>Supports PNG, JPG, GIF, MP4, WebM, OGG and many more</small>
      <input type="file" id="mediaInput" accept="image/*,video/*">
    </div>

    <div class="control-group" id="rowsGroup">
      <label for="rowsInput">Rows (for preview)</label>
      <input type="number" id="rowsInput" min="1" max="100" value="1" title="Number of rows in the sprite sheet grid. Each cell is treated as one animation frame. Auto-detected when an image is loaded.">
    </div>

    <div class="control-group" id="columnsGroup">
      <label for="columnsInput">Columns (for preview)</label>
      <input type="number" id="columnsInput" min="1" max="100" value="1" title="Number of columns in the sprite sheet grid. Each cell is treated as one animation frame. Auto-detected when an image is loaded.">
    </div>

    <div class="fps-controls-group">
      <div class="control-group">
        <label for="animationFpsInput">Animation FPS</label>
        <input type="number" id="animationFpsInput" min="1" max="60" value="12" title="Frames per second for the animation preview playback. Higher values make the animation play faster.">
      </div>
    </div>

    <div class="fps-controls-group">
      <div class="control-group">
        <label for="videoFpsInput">Video Extraction FPS</label>
        <input type="number" id="videoFpsInput" min="1" max="60" value="12" title="How many frames to extract per second from a video file. Higher values produce more frames and smoother animation but take longer to process. Disabled when an image is loaded.">
      </div>
    </div>

    <div class="frame-size-section">
      <div class="frame-size-control">
        <label for="frameWidthInput">Frame Width (px)</label>
        <input type="number" id="frameWidthInput" min="1" value="0" title="Display width of each frame in pixels. Changing this scales the frame while maintaining the original aspect ratio. Affects both the preview and the exported sprite sheet.">
      </div>
      <div class="frame-size-control">
        <label for="frameHeightInput">Frame Height (px)</label>
        <input type="number" id="frameHeightInput" min="1" value="0" title="Display height of each frame in pixels. Changing this scales the frame while maintaining the original aspect ratio. Affects both the preview and the exported sprite sheet.">
      </div>
    </div>

    <div class="padding-controls">
      <div class="padding-control">
        <label for="paddingTopInput">Top (px)</label>
        <input type="number" id="paddingTopInput" value="0" title="Extra transparent space added above the frame content in the output. Useful for giving sprites breathing room or aligning them within a fixed canvas.">
      </div>
      <div class="padding-control">
        <label for="paddingRightInput">Right (px)</label>
        <input type="number" id="paddingRightInput" value="0" title="Extra transparent space added to the right of the frame content in the output.">
      </div>
      <div class="padding-control">
        <label for="paddingBottomInput">Bottom (px)</label>
        <input type="number" id="paddingBottomInput" value="0" title="Extra transparent space added below the frame content in the output.">
      </div>
      <div class="padding-control">
        <label for="paddingLeftInput">Left (px)</label>
        <input type="number" id="paddingLeftInput" value="0" title="Extra transparent space added to the left of the frame content in the output.">
      </div>
    </div>

    <div class="movement-controls" id="movementControls">
      <div class="movement-control">
        <label for="moveXInput">Horizontal offset / frame (px)</label>
        <input type="number" id="moveXInput" value="0.0" step="any" title="Shifts each frame horizontally by this amount multiplied by the frame's index. Use a positive value to pan right across frames, negative to pan left. Supports decimals for sub-pixel precision.">
      </div>
      <div class="movement-control">
        <label for="moveYInput">Vertical offset / frame (px)</label>
        <input type="number" id="moveYInput" value="0.0" step="any" title="Shifts each frame vertically by this amount multiplied by the frame's index. Use a positive value to pan downward across frames, negative to pan upward. Supports decimals for sub-pixel precision.">
      </div>
      <div class="movement-control full-width">
        <div class="movement-toggle-row">
          <input type="checkbox" id="useOriginalIndexCheckbox" title="When checked, the offset multiplier is based on the frame's original index in the full sheet/video rather than its position within the current selection. Useful when you skip frames but still want the motion to align with the original sequence.">
          <label for="useOriginalIndexCheckbox">Base offset on original frame index (not selection order)</label>
        </div>
      </div>
    </div>

    <div class="background-removal-group">
      <div class="background-removal-checkbox">
        <input type="checkbox" id="removeBackgroundCheckbox" title="Automatically removes the background from each frame using an AI model. Processing happens in your browser — no data is sent to a server. May take a moment per frame.">
        <label for="removeBackgroundCheckbox">Remove Background</label>
      </div>
      <select id="backgroundColorSelect" class="background-color-select" title="Choose what color to fill behind the subject after background removal. 'Transparent' preserves the alpha channel in the exported PNG.">
        <option value="transparent">Transparent</option>
        <option value="black">Black</option>
        <option value="white">White</option>
        <option value="#FF0000">Red</option>
        <option value="#00FF00">Green</option>
        <option value="#0000FF">Blue</option>
        <option value="#FFFF00">Yellow</option>
        <option value="#FF00FF">Magenta</option>
        <option value="#00FFFF">Cyan</option>
        <option value="#FFA500">Orange</option>
        <option value="#800080">Purple</option>
        <option value="#FFC0CB">Pink</option>
        <option value="#A52A2A">Brown</option>
        <option value="#808080">Gray</option>
      </select>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="stretchCheckbox" title="Scales the animation preview to fill the preview area while maintaining the frame's original aspect ratio. Does not affect the exported output.">
      <label for="stretchCheckbox">Stretch Preview (Keep Aspect Ratio)</label>
    </div>
  </div>

  <div class="status-message" id="statusMessage"></div>
  <div id="processingIndicator" class="processing-indicator" style="display: none;">
    Extracting frames from video... <span id="frameCount">0</span>/<span id="frameTotalCount">0</span>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="main-content" id="mainContent" style="display:none">
    <div class="preview-section">
      <div class="preview-header">
        <div class="preview-title" id="previewTitle">Animation Preview</div>
      </div>
      <div class="preview-container" id="previewContainer">
        <canvas id="previewCanvas"></canvas>
      </div>
      <div class="slider-container">
        <input type="range" id="frameSlider" min="0" max="0" value="0" title="Scrub through selected frames manually. Drag left/right to step through animation frames one by one.">
        <div class="slider-label" id="sliderLabel">Drag to scrub through frames</div>
      </div>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="totalFrames">0</div>
          <div class="stat-label">Total Frames</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="selectedFrames">0</div>
          <div class="stat-label">Selected Frames</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="animDuration">0s</div>
          <div class="stat-label">Duration</div>
        </div>
      </div>
    </div>

    <div class="frames-section">
      <label class="frames-label">Frame Selection</label>
      <div class="frames-grid" id="framesGrid"></div>
      <div class="buttons-section" style="flex-direction: column; gap: 10px; margin-top: 15px;">
        <button class="btn-secondary" id="selectAllBtn">Select All</button>
        <button class="btn-secondary" id="deselectAllBtn">Deselect All</button>
      </div>
    </div>
  </div>

  <div class="buttons-section" id="exportSection" style="display:none; margin-top: 30px; border-top: 2px solid #e0e0e0; padding-top: 30px;">
    <button class="btn-success" id="exportBtn" disabled>📥 Export Selected Sprites</button>
  </div>
</div>

<video id="videoElement" class="video-element"></video>

<script>
  class SpriteSheetEditor {
    constructor() {
      this.media = null;
      this.mediaType = null;
      this.rows = 1;
      this.columns = 1;
      this.animationFps = 12;
      this.videoFps = 12;
      this.frameWidth = 0;
      this.frameHeight = 0;
      this.displayFrameWidth = 0;
      this.displayFrameHeight = 0;
      this.paddingTop = 0;
      this.paddingRight = 0;
      this.paddingBottom = 0;
      this.paddingLeft = 0;
      this.selectedFrames = new Set();
      this.currentFrame = 0;
      this.lastFrameTime = 0;
      this.animationRunning = false;
      this.frames = [];
      this.isSliderDragging = false;
      this.stretchPreview = false;
      this.needsRender = false;
      this.lastRenderedFrame = -1;
      this.removeBackground = false;
      this.backgroundColor = 'transparent';
      this.processedFrames = new Map();
      this.processedFrameCanvasCache = new Map();
      this.videoFrameImageCache = new Map();
      this.isProcessingBackground = false;
      this.isRendering = false;
      this.offscreenCanvas = null;
      this.offscreenCtx = null;
      this.lastCanvasWidth = 0;
      this.lastCanvasHeight = 0;
      this.originalAspectRatio = 1;
      this.moveX = 0;
      this.moveY = 0;
      this.useOriginalIndex = false;
      this.removeBackgroundConfig = {
        device: this.isSecureOrLocalhost() ? "gpu" : "cpu",
        proxyToWorker: true,
      };
      this.removeBackgroundModelInitialized = false;

      this.initializeElements();
      this.attachEventListeners();
      this.startAnimationLoop();

      if (typeof window.removeBackground === 'undefined') {
        console.warn('Background removal library not yet loaded. It will be available after a moment.');
        setTimeout(() => {
          if (typeof window.removeBackground === 'undefined') {
            console.error('Background removal library failed to load');
          } else {
            this.preloadBackgroundRemovalModel();
          }
        }, 3000);
      } else {
        this.preloadBackgroundRemovalModel();
      }
    }

    async preloadBackgroundRemovalModel() {
      console.log('initializing background removal model...');
      await window.preloadRemoveBackground(this.removeBackgroundConfig);
      console.log('Background removal model initialized');
      this.removeBackgroundModelInitialized = true;
    }

    initializeElements() {
      this.dropZone = document.getElementById('dropZone');
      this.mediaInput = document.getElementById('mediaInput');
      this.rowsInput = document.getElementById('rowsInput');
      this.columnsInput = document.getElementById('columnsInput');
      this.animationFpsInput = document.getElementById('animationFpsInput');
      this.videoFpsInput = document.getElementById('videoFpsInput');
      this.frameWidthInput = document.getElementById('frameWidthInput');
      this.frameHeightInput = document.getElementById('frameHeightInput');
      this.paddingTopInput = document.getElementById('paddingTopInput');
      this.paddingRightInput = document.getElementById('paddingRightInput');
      this.paddingBottomInput = document.getElementById('paddingBottomInput');
      this.paddingLeftInput = document.getElementById('paddingLeftInput');
      this.stretchCheckbox = document.getElementById('stretchCheckbox');
      this.removeBackgroundCheckbox = document.getElementById('removeBackgroundCheckbox');
      this.backgroundColorSelect = document.getElementById('backgroundColorSelect');
      this.previewCanvas = document.getElementById('previewCanvas');
      this.previewCtx = this.previewCanvas.getContext('2d');
      this.previewContainer = document.getElementById('previewContainer');
      this.frameSlider = document.getElementById('frameSlider');
      this.sliderLabel = document.getElementById('sliderLabel');
      this.previewTitle = document.getElementById('previewTitle');
      this.framesGrid = document.getElementById('framesGrid');
      this.exportBtn = document.getElementById('exportBtn');
      this.selectAllBtn = document.getElementById('selectAllBtn');
      this.deselectAllBtn = document.getElementById('deselectAllBtn');
      this.statusMessage = document.getElementById('statusMessage');
      this.totalFramesDisplay = document.getElementById('totalFrames');
      this.selectedFramesDisplay = document.getElementById('selectedFrames');
      this.animDurationDisplay = document.getElementById('animDuration');
      this.videoElement = document.getElementById('videoElement');
      this.processingIndicator = document.getElementById('processingIndicator');
      this.progressFill = document.getElementById('progressFill');
      this.frameCountDisplay = document.getElementById('frameCount');
      this.frameTotalCountDisplay = document.getElementById('frameTotalCount');
      this.rowsGroup = document.getElementById('rowsGroup');
      this.columnsGroup = document.getElementById('columnsGroup');
      this.moveXInput = document.getElementById('moveXInput');
      this.moveYInput = document.getElementById('moveYInput');
      this.useOriginalIndexCheckbox = document.getElementById('useOriginalIndexCheckbox');
      this.mainContent = document.getElementById('mainContent');
      this.exportSection = document.getElementById('exportSection');
    }

    attachEventListeners() {
      this.dropZone.addEventListener('click', () => this.mediaInput.click());
      this.dropZone.addEventListener('dragover', (e) => this.handleDragOver(e));
      this.dropZone.addEventListener('dragleave', (e) => this.handleDragLeave(e));
      this.dropZone.addEventListener('drop', (e) => this.handleDrop(e));

      this.mediaInput.addEventListener('change', (e) => this.handleMediaUpload(e));

      this.rowsInput.addEventListener('change', () => this.updateGrid());
      this.columnsInput.addEventListener('change', () => this.updateGrid());

      this.animationFpsInput.addEventListener('change', () => {
        this.animationFps = parseInt(this.animationFpsInput.value) || 12;
        this.updateStats();
      });

      this.videoFpsInput.addEventListener('change', () => {
        this.videoFps = parseInt(this.videoFpsInput.value) || 12;
        if (this.mediaType === 'video') {
          this.extractVideoFrames();
        }
      });

      this.frameWidthInput.addEventListener('input', () => this.updateFrameSize('width'));
      this.frameHeightInput.addEventListener('input', () => this.updateFrameSize('height'));

      this.paddingTopInput.addEventListener('change', () => this.updatePadding());
      this.paddingRightInput.addEventListener('change', () => this.updatePadding());
      this.paddingBottomInput.addEventListener('change', () => this.updatePadding());
      this.paddingLeftInput.addEventListener('change', () => this.updatePadding());

      this.stretchCheckbox.addEventListener('change', () => this.updateStretchPreview());

      this.removeBackgroundCheckbox.addEventListener('change', () => this.toggleBackgroundRemoval());
      this.backgroundColorSelect.addEventListener('change', () => this.updateBackgroundColor());

      this.frameSlider.addEventListener('mousedown', () => this.onSliderDragStart());
      this.frameSlider.addEventListener('touchstart', () => this.onSliderDragStart());
      this.frameSlider.addEventListener('input', (e) => this.onSliderInput(e));
      this.frameSlider.addEventListener('mouseup', () => this.onSliderDragEnd());
      this.frameSlider.addEventListener('touchend', () => this.onSliderDragEnd());

      this.selectAllBtn.addEventListener('click', () => this.selectAll());
      this.deselectAllBtn.addEventListener('click', () => this.deselectAll());
      this.exportBtn.addEventListener('click', () => this.exportSprites());

      this.videoElement.addEventListener('loadedmetadata', () => this.onVideoLoaded());

      this.moveXInput.addEventListener('input', () => {
        this.moveX = parseFloat(this.moveXInput.value) || 0;
        this.renderFrameGrid();
        this.needsRender = true;
      });
      this.moveXInput.addEventListener('blur', () => {
        this.moveXInput.value = this.formatDecimalInput(this.moveXInput.value);
      });
      this.moveYInput.addEventListener('input', () => {
        this.moveY = parseFloat(this.moveYInput.value) || 0;
        this.renderFrameGrid();
        this.needsRender = true;
      });
      this.moveYInput.addEventListener('blur', () => {
        this.moveYInput.value = this.formatDecimalInput(this.moveYInput.value);
      });
      this.useOriginalIndexCheckbox.addEventListener('change', () => {
        this.useOriginalIndex = this.useOriginalIndexCheckbox.checked;
        this.renderFrameGrid();
        this.needsRender = true;
      });
    }

    // Formats a numeric string to always show at least one decimal place.
    formatDecimalInput(value) {
      const num = parseFloat(value);
      if (isNaN(num)) return '0.0';
      // If it's a whole number, force one decimal digit; otherwise keep as-is (trim trailing zeros beyond 1)
      if (Number.isInteger(num)) return num.toFixed(1);
      return String(num);
    }

    revealMediaSections() {
      this.mainContent.style.display = '';
      this.exportSection.style.display = '';
    }

    // Returns {dx, dy} pixel offset to apply when drawing frameIndex.
    // originalIndex = the frame's index in the sheet/video.
    // positionInSelected = its position in the sorted selected array (-1 if not selected).
    getFrameOffset(originalIndex, positionInSelected) {
      if (this.moveX === 0 && this.moveY === 0) return { dx: 0, dy: 0 };
      const multiplier = this.useOriginalIndex ? originalIndex : positionInSelected;
      if (multiplier < 0) return { dx: 0, dy: 0 };
      return {
        dx: Math.floor(multiplier * this.moveX),
        dy: Math.floor(multiplier * this.moveY),
      };
    }

    toggleBackgroundRemoval() {
      this.removeBackground = this.removeBackgroundCheckbox.checked;
      this.backgroundColorSelect.classList.toggle('visible', this.removeBackground);

      if (this.removeBackground) {
        this.processedFrames.clear();
        this.processedFrameCanvasCache.clear();
        this.processAllFramesBackground();
      } else {
        this.processedFrames.clear();
        this.processedFrameCanvasCache.clear();
        this.hideBgRemovalProgress();
      }
      this.updatePreviewBackgroundColor();
    }

    updateBackgroundColor() {
      this.backgroundColor = this.backgroundColorSelect.value;
      this.processedFrameCanvasCache.clear();
      this.updatePreviewBackgroundColor();
      this.needsRender = true;
    }

    updatePreviewBackgroundColor() {
      if (!this.removeBackground) {
        this.previewContainer.classList.remove('bg-transparent', 'bg-black', 'bg-white');
        this.previewContainer.style.background = '';
        return;
      }

      this.previewContainer.classList.remove('bg-transparent', 'bg-black', 'bg-white');
      this.previewContainer.style.background = '';

      if (this.backgroundColor === 'transparent') {
        this.previewContainer.classList.add('bg-transparent');
      } else if (this.backgroundColor === 'black') {
        this.previewContainer.classList.add('bg-black');
      } else if (this.backgroundColor === 'white') {
        this.previewContainer.classList.add('bg-white');
      } else {
        this.previewContainer.style.background = this.backgroundColor;
      }
    }

    async processAllFramesBackground() {
      if (this.frames.length === 0 && this.mediaType !== 'image') return;

      this.isProcessingBackground = true;
      this.processedFrameCanvasCache.clear();
      const totalFrames = this.mediaType === 'video' ? this.frames.length : (this.rows * this.columns);

      this.showBgRemovalProgress(0, totalFrames);

      let processed = 0;
      for (let i = 0; i < totalFrames; i++) {
        if (!this.removeBackground) break;
        if (this.processedFrames.has(i)) {
          processed++;
          this.showBgRemovalProgress(processed, totalFrames);
          continue;
        }
        await this.processFrameBackground(i);
        processed++;
        this.showBgRemovalProgress(processed, totalFrames);
      }

      this.isProcessingBackground = false;
      this.hideBgRemovalProgress();
      this.renderFrameGrid();
      this.needsRender = true;
    }

    showBgRemovalProgress(current, total) {
      let overlay = document.getElementById('bgRemovalOverlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'bgRemovalOverlay';
        overlay.className = 'bg-removal-processing';
        overlay.innerHTML = `
          <div class="bg-removal-text">Removing backgrounds... <span id="bgRemovalCount">0</span>/<span id="bgRemovalTotal">0</span></div>
          <div class="bg-removal-progress">
            <div class="bg-removal-progress-fill" id="bgRemovalFill"></div>
          </div>
        `;
        this.previewContainer.style.position = 'relative';
        this.previewContainer.appendChild(overlay);
      }
      const countEl = document.getElementById('bgRemovalCount');
      const totalEl = document.getElementById('bgRemovalTotal');
      const fillEl = document.getElementById('bgRemovalFill');
      if (countEl) countEl.textContent = current;
      if (totalEl) totalEl.textContent = total;
      if (fillEl) fillEl.style.width = (total > 0 ? (current / total) * 100 : 0) + '%';
    }

    hideBgRemovalProgress() {
      const overlay = document.getElementById('bgRemovalOverlay');
      if (overlay) overlay.remove();
    }

    async processFrameBackground(frameIndex) {
      try {
        let canvas = document.createElement('canvas');

        if (this.mediaType === 'image') {
          canvas.width = this.frameWidth;
          canvas.height = this.frameHeight;
          const ctx = canvas.getContext('2d');
          const row = Math.floor(frameIndex / this.columns);
          const col = frameIndex % this.columns;
          ctx.drawImage(
            this.media,
            col * this.frameWidth, row * this.frameHeight,
            this.frameWidth, this.frameHeight,
            0, 0, this.frameWidth, this.frameHeight
          );
        } else if (this.mediaType === 'video') {
          const img = await this.getVideoFrameImage(frameIndex);
          if (!img) return;
          canvas.width = this.frameWidth;
          canvas.height = this.frameHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, this.frameWidth, this.frameHeight);
        }

        const blob = await this.canvasToBlob(canvas);
        const result = await window.removeBackground(blob, this.removeBackgroundConfig);
        this.processedFrames.set(frameIndex, result);
      } catch (error) {
        console.error(`Error processing frame ${frameIndex}:`, error);
        this.showMessage(`Error processing frame ${frameIndex}`, 'error');
      }
    }

    isSecureOrLocalhost() {
      const protocol = window.location.protocol;
      const hostname = window.location.hostname;
      return protocol === "https:" || hostname === "localhost" || hostname === "127.0.0.1";
    }

    canvasToBlob(canvas) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error('Failed to create blob from canvas'));
        }, 'image/png');
      });
    }

    async getProcessedFrameCanvas(frameIndex) {
      if (!this.removeBackground || !this.processedFrames.has(frameIndex)) return null;

      const cacheKey = `${frameIndex}_${this.displayFrameWidth}_${this.displayFrameHeight}_${this.backgroundColor}`;
      if (this.processedFrameCanvasCache.has(cacheKey)) {
        return this.processedFrameCanvasCache.get(cacheKey);
      }

      const blob = this.processedFrames.get(frameIndex);
      const url = URL.createObjectURL(blob);

      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = this.displayFrameWidth;
          canvas.height = this.displayFrameHeight;
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          if (this.backgroundColor !== 'transparent') {
            ctx.fillStyle = this.backgroundColor === 'black' ? '#000000'
              : this.backgroundColor === 'white' ? '#ffffff'
              : this.backgroundColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
          }
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          URL.revokeObjectURL(url);
          this.processedFrameCanvasCache.set(cacheKey, canvas);
          resolve(canvas);
        };
        img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
        img.src = url;
      });
    }

    getVideoFrameImage(frameIndex) {
      if (this.videoFrameImageCache.has(frameIndex)) {
        return Promise.resolve(this.videoFrameImageCache.get(frameIndex));
      }
      const frameData = this.frames[frameIndex];
      if (!frameData) return Promise.resolve(null);
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => { this.videoFrameImageCache.set(frameIndex, img); resolve(img); };
        img.onerror = () => resolve(null);
        img.src = frameData;
      });
    }

    handleDragOver(e) {
      e.preventDefault();
      this.dropZone.classList.add('dragover');
    }

    handleDragLeave(e) {
      e.preventDefault();
      this.dropZone.classList.remove('dragover');
    }

    handleDrop(e) {
      e.preventDefault();
      this.dropZone.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        this.mediaInput.files = files;
        this.handleMediaUpload({ target: { files } });
      }
    }

    handleMediaUpload(e) {
      const files = e.target.files;
      if (files.length === 0) return;
      const file = files[0];
      if (file.type.startsWith('video/')) {
        this.handleVideoUpload(file);
      } else {
        this.handleImageUpload(file);
      }
    }

    handleImageUpload(file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          this.media = img;
          this.mediaType = 'image';
          this.frames = [];
          this.processedFrames.clear();
          this.processedFrameCanvasCache.clear();
          this.videoFrameImageCache.clear();
          this.removeBackgroundCheckbox.checked = false;
          this.removeBackground = false;
          this.backgroundColorSelect.classList.remove('visible');
          this.hideBgRemovalProgress();
          this.lastCanvasWidth = 0;
          this.lastCanvasHeight = 0;
          this.analyzeImage();
          this.updateGridVisibility();
          this.originalAspectRatio = this.frameWidth / this.frameHeight;
          this.updateFrameSizeInputs();
          this.updateGrid();
          this.videoFpsInput.disabled = true;
          this.videoFpsInput.closest('.fps-controls-group').style.opacity = '0.5';
          this.revealMediaSections();
          this.showMessage('Image loaded and scanned for empty frames!', 'success');
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    async autoSelectNonEmptyFrames() {
      this.selectedFrames.clear();
      const total = this.mediaType === 'video' ? this.frames.length : (this.rows * this.columns);
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = this.frameWidth;
      tempCanvas.height = this.frameHeight;
      const tempCtx = tempCanvas.getContext('2d');

      for (let i = 0; i < total; i++) {
        tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
        if (this.mediaType === 'image') {
          const row = Math.floor(i / this.columns);
          const col = i % this.columns;
          tempCtx.drawImage(this.media, col * this.frameWidth, row * this.frameHeight, this.frameWidth, this.frameHeight, 0, 0, this.frameWidth, this.frameHeight);
        } else {
          const img = await this.getVideoFrameImage(i);
          if (img) tempCtx.drawImage(img, 0, 0);
        }
        if (!this.isFrameEmpty(tempCanvas)) {
          this.selectedFrames.add(i);
        }
      }
      this.renderFrameGrid();
      this.updateStats();
      this.updateSlider();
      this.startAnimation();
    }

    isFrameEmpty(canvas) {
      const ctx = canvas.getContext('2d');
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      for (let i = 3; i < imageData.length; i += 4) {
        if (imageData[i] > 0) return false;
      }
      return true;
    }

    handleVideoUpload(file) {
      const fileURL = URL.createObjectURL(file);
      this.videoElement.src = fileURL;
      this.mediaType = 'video';
      this.media = null;
      this.frames = [];
      this.processedFrames.clear();
      this.processedFrameCanvasCache.clear();
      this.videoFrameImageCache.clear();
      this.removeBackgroundCheckbox.checked = false;
      this.removeBackground = false;
      this.backgroundColorSelect.classList.remove('visible');
      this.hideBgRemovalProgress();
      this.lastCanvasWidth = 0;
      this.lastCanvasHeight = 0;
      this.updateGridVisibility();
      this.videoFpsInput.disabled = false;
      this.videoFpsInput.closest('.fps-controls-group').style.opacity = '';
    }

    onVideoLoaded() {
      this.showMessage('Video loaded. Extracting frames...', 'info');
      this.extractVideoFrames();
    }

    extractVideoFrames() {
      const fps = parseInt(this.videoFpsInput.value) || 12;
      const videoDuration = this.videoElement.duration;
      const frameTimestamps = [];
      const frameInterval = 1 / fps;
      for (let time = 0; time < videoDuration; time += frameInterval) {
        frameTimestamps.push(time);
      }

      const totalFramesToExtract = frameTimestamps.length;
      this.frameTotalCountDisplay.textContent = totalFramesToExtract;
      this.processingIndicator.style.display = 'block';

      const extractedFrames = [];
      let framesProcessed = 0;

      const extractNextFrame = (index) => {
        if (index >= frameTimestamps.length) {
          this.frames = extractedFrames;
          this.videoFrameImageCache.clear();
          this.processingIndicator.style.display = 'none';
          this.frameWidth = this.videoElement.videoWidth;
          this.frameHeight = this.videoElement.videoHeight;
          this.displayFrameWidth = this.frameWidth;
          this.displayFrameHeight = this.frameHeight;
          this.rows = 1;
          this.columns = 1;
          this.rowsInput.value = 1;
          this.columnsInput.value = 1;
          this.selectedFrames.clear();
          this.selectAll();
          this.updateFrameSizeInputs();
          this.renderFrameGrid();
          this.updateSlider();
          this.updateStats();
          this.startAnimation();
          this.revealMediaSections();
          this.showMessage(`Successfully extracted ${this.frames.length} frames from video!`, 'success');
          return;
        }

        const timestamp = frameTimestamps[index];
        this.videoElement.currentTime = timestamp;

        this.videoElement.addEventListener('seeked', () => {
          const canvas = document.createElement('canvas');
          canvas.width = this.videoElement.videoWidth;
          canvas.height = this.videoElement.videoHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(this.videoElement, 0, 0);
          extractedFrames.push(canvas.toDataURL('image/png'));
          framesProcessed++;
          this.frameCountDisplay.textContent = framesProcessed;
          this.progressFill.style.width = (framesProcessed / totalFramesToExtract) * 100 + '%';
          extractNextFrame(index + 1);
        }, { once: true });
      };

      extractNextFrame(0);
    }

    analyzeImage() {
      if (!this.media) return;
      const w = this.media.width;
      const h = this.media.height;
      const MAX_DET = 20;

      const sampleCanvas = document.createElement('canvas');
      sampleCanvas.width = w;
      sampleCanvas.height = h;
      const sampleCtx = sampleCanvas.getContext('2d');
      sampleCtx.drawImage(this.media, 0, 0);
      const pixels = sampleCtx.getImageData(0, 0, w, h).data;

      const getP = (x, y) => { const i = (y * w + x) * 4; return [pixels[i], pixels[i+1], pixels[i+2], pixels[i+3]]; };
      const bg = getP(0, 0);
      const isBg = (x, y) => {
        const p = getP(x, y);
        if (p[3] < 10) return true;
        return Math.sqrt((p[0]-bg[0])**2 + (p[1]-bg[1])**2 + (p[2]-bg[2])**2 + (p[3]-bg[3])**2) < 30;
      };

      const colLum   = new Float32Array(w);
      const colEmpty = new Float32Array(w);
      const rowLum   = new Float32Array(h);
      const rowEmpty = new Float32Array(h);

      for (let x = 0; x < w; x++) {
        let lum = 0, empty = 0;
        for (let y = 0; y < h; y++) {
          const i = (y * w + x) * 4;
          lum += 0.299 * pixels[i] + 0.587 * pixels[i+1] + 0.114 * pixels[i+2];
          if (isBg(x, y)) empty++;
        }
        colLum[x]   = lum / h;
        colEmpty[x] = empty / h;
      }
      for (let y = 0; y < h; y++) {
        let lum = 0, empty = 0;
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          lum += 0.299 * pixels[i] + 0.587 * pixels[i+1] + 0.114 * pixels[i+2];
          if (isBg(x, y)) empty++;
        }
        rowLum[y]   = lum / w;
        rowEmpty[y] = empty / w;
      }

      const scoreEmptiness = (profile, N, size) => {
        if (N === 1) return 0;
        let score = 0;
        for (let i = 1; i < N; i++) {
          const x = Math.round((size / N) * i);
          let v = 0, c = 0;
          for (let d = -2; d <= 2; d++) {
            const xi = x + d;
            if (xi >= 0 && xi < size) { v += profile[xi]; c++; }
          }
          score += v / c;
        }
        return score / (N - 1);
      };

      const scoreFft = (signal, N, size) => {
        if (N === 1) return 0;
        const mean = signal.reduce((a, b) => a + b, 0) / size;
        let re = 0, im = 0;
        for (let i = 0; i < size; i++) {
          const a = 2 * Math.PI * N * i / size;
          re += (signal[i] - mean) * Math.cos(a);
          im += (signal[i] - mean) * Math.sin(a);
        }
        const mag = Math.sqrt(re * re + im * im) / size;
        const dc  = signal.reduce((a, b) => a + Math.abs(b - mean), 0) / size;
        return dc > 0 ? mag / dc : 0;
      };

      const findBest = (lum, empty, size) => {
        const emptyScores = new Float32Array(MAX_DET + 1);
        const fftScores   = new Float32Array(MAX_DET + 1);

        for (let n = 1; n <= MAX_DET; n++) {
          emptyScores[n] = scoreEmptiness(empty, n, size);
          fftScores[n]   = scoreFft(lum, n, size);
        }

        const normalize = (arr) => {
          let mn = Infinity, mx = -Infinity;
          for (let n = 1; n <= MAX_DET; n++) { if (arr[n] < mn) mn = arr[n]; if (arr[n] > mx) mx = arr[n]; }
          const r = mx - mn || 1;
          const out = new Float32Array(MAX_DET + 1);
          for (let n = 1; n <= MAX_DET; n++) out[n] = (arr[n] - mn) / r;
          return out;
        };

        const normEmpty = normalize(emptyScores);
        const normFft   = normalize(fftScores);

        const combined = new Float32Array(MAX_DET + 1);
        for (let n = 1; n <= MAX_DET; n++) {
          combined[n] = normEmpty[n] * 0.5 + normFft[n] * 0.5;
        }

        // Harmonic rejection: prefer N over its sub-harmonics when N scores nearly as well
        const HARMONIC_THRESHOLD = 0.75;
        const rejected = new Set();
        for (let n = 2; n <= MAX_DET; n++) {
          for (let multiple = n * 2; multiple <= MAX_DET; multiple += n) {
            if (combined[multiple] >= combined[n] * HARMONIC_THRESHOLD) {
              rejected.add(n);
            }
          }
        }

        let bestN = 1, bestScore = -Infinity;
        for (let n = 1; n <= MAX_DET; n++) {
          if (rejected.has(n)) continue;
          if (combined[n] > bestScore) {
            bestScore = combined[n];
            bestN = n;
          }
        }

        return bestN;
      };

      this.columnsInput.value = findBest(colLum, colEmpty, w);
      this.rowsInput.value    = findBest(rowLum, rowEmpty, h);
    }

    updateGridVisibility() {
      if (this.mediaType === 'video') {
        this.rowsGroup.classList.add('disabled');
        this.columnsGroup.classList.add('disabled');
      } else {
        this.rowsGroup.classList.remove('disabled');
        this.columnsGroup.classList.remove('disabled');
      }
    }

    updateFrameSizeInputs() {
      if (this.mediaType === 'image' && this.media) {
        this.rows = parseInt(this.rowsInput.value);
        this.columns = parseInt(this.columnsInput.value);
        this.frameWidth = this.media.width / this.columns;
        this.frameHeight = this.media.height / this.rows;
      }
      this.displayFrameWidth = this.frameWidth;
      this.displayFrameHeight = this.frameHeight;
      this.frameWidthInput.value = Math.round(this.displayFrameWidth);
      this.frameHeightInput.value = Math.round(this.displayFrameHeight);
    }

    updateFrameSize(changedDimension) {
      if (changedDimension === 'width') {
        this.displayFrameWidth = parseInt(this.frameWidthInput.value) || 1;
        this.displayFrameHeight = this.displayFrameWidth / this.originalAspectRatio;
        this.frameHeightInput.value = Math.round(this.displayFrameHeight);
      } else {
        this.displayFrameHeight = parseInt(this.frameHeightInput.value) || 1;
        this.displayFrameWidth = this.displayFrameHeight * this.originalAspectRatio;
        this.frameWidthInput.value = Math.round(this.displayFrameWidth);
      }
      this.processedFrameCanvasCache.clear();
      this.renderFrameGrid();
      this.updateStats();
      this.needsRender = true;
    }

    updatePadding() {
      this.paddingTop    = parseInt(this.paddingTopInput.value)    || 0;
      this.paddingRight  = parseInt(this.paddingRightInput.value)  || 0;
      this.paddingBottom = parseInt(this.paddingBottomInput.value) || 0;
      this.paddingLeft   = parseInt(this.paddingLeftInput.value)   || 0;
      this.processedFrameCanvasCache.clear();
      this.renderFrameGrid();
      this.needsRender = true;
    }

    updateStretchPreview() {
      this.stretchPreview = this.stretchCheckbox.checked;
      if (this.stretchPreview) {
        this.previewContainer.classList.add('stretch');
      } else {
        this.previewContainer.classList.remove('stretch');
      }
    }

    updateGrid() {
      if (!this.media && this.mediaType !== 'video') {
        this.showMessage('Please upload media first', 'error');
        return;
      }

      if (this.mediaType === 'image') {
        this.rows    = Math.max(1, parseInt(this.rowsInput.value)    || 1);
        this.columns = Math.max(1, parseInt(this.columnsInput.value) || 1);
        this.frameWidth  = this.media.width  / this.columns;
        this.frameHeight = this.media.height / this.rows;

        this.originalAspectRatio = this.frameWidth / this.frameHeight;
        this.displayFrameWidth  = this.frameWidth;
        this.displayFrameHeight = this.frameHeight;
        this.frameWidthInput.value  = Math.round(this.displayFrameWidth);
        this.frameHeightInput.value = Math.round(this.displayFrameHeight);

        this.processedFrames.clear();
        this.processedFrameCanvasCache.clear();

        // Scan frames and deselect empty ones automatically
        this.autoSelectNonEmptyFrames();
      }
    }

    renderFrameGrid() {
      this.framesGrid.innerHTML = '';
      if (this.mediaType === 'image') {
        this.renderImageFrameGrid();
      } else if (this.mediaType === 'video') {
        this.renderVideoFrameGrid();
      }
    }

    renderImageFrameGrid() {
      const totalFrames = this.rows * this.columns;
      // Build map: originalIndex → positionInSelected
      const selectedArray = Array.from(this.selectedFrames).sort((a, b) => a - b);
      const posMap = new Map(selectedArray.map((fi, pos) => [fi, pos]));

      for (let i = 0; i < totalFrames; i++) {
        const frameDiv = document.createElement('div');
        frameDiv.className = this.selectedFrames.has(i) ? 'frame-item included' : 'frame-item excluded';
        frameDiv.dataset.frameIndex = i;

        const frameCanvas = document.createElement('canvas');
        const totalWidth  = this.displayFrameWidth  + this.paddingLeft + this.paddingRight;
        const totalHeight = this.displayFrameHeight + this.paddingTop  + this.paddingBottom;
        frameCanvas.width  = totalWidth;
        frameCanvas.height = totalHeight;
        const ctx = frameCanvas.getContext('2d');
        ctx.clearRect(0, 0, totalWidth, totalHeight);

        const row = Math.floor(i / this.columns);
        const col = i % this.columns;
        const { dx, dy } = this.getFrameOffset(i, posMap.has(i) ? posMap.get(i) : -1);
        const destX = this.paddingLeft - dx;
        const destY = this.paddingTop  - dy;

        if (this.removeBackground && this.processedFrames.has(i)) {
          const processedBlob = this.processedFrames.get(i);
          const url = URL.createObjectURL(processedBlob);
          const img = new Image();
          img.onload = () => {
            if (this.backgroundColor !== 'transparent') {
              ctx.fillStyle = this.backgroundColor === 'black' ? '#000000'
                : this.backgroundColor === 'white' ? '#ffffff'
                : this.backgroundColor;
              ctx.fillRect(0, 0, totalWidth, totalHeight);
            }
            ctx.drawImage(img, 0, 0, this.displayFrameWidth, this.displayFrameHeight, destX, destY, this.displayFrameWidth, this.displayFrameHeight);
            URL.revokeObjectURL(url);
          };
          img.src = url;
        } else {
          ctx.drawImage(this.media, col * this.frameWidth, row * this.frameHeight, this.frameWidth, this.frameHeight, destX, destY, this.displayFrameWidth, this.displayFrameHeight);
        }

        const frameNumber = document.createElement('div');
        frameNumber.className = 'frame-number';
        frameNumber.textContent = i + 1;

        frameDiv.appendChild(frameCanvas);
        frameDiv.appendChild(frameNumber);
        frameDiv.addEventListener('click', () => this.toggleFrame(i, frameDiv));
        this.framesGrid.appendChild(frameDiv);
      }
    }

    renderVideoFrameGrid() {
      const selectedArray = Array.from(this.selectedFrames).sort((a, b) => a - b);
      const posMap = new Map(selectedArray.map((fi, pos) => [fi, pos]));

      this.frames.forEach((frameData, i) => {
        const frameDiv = document.createElement('div');
        frameDiv.className = this.selectedFrames.has(i) ? 'frame-item included' : 'frame-item excluded';
        frameDiv.dataset.frameIndex = i;

        const frameCanvas = document.createElement('canvas');
        const totalWidth  = this.displayFrameWidth  + this.paddingLeft + this.paddingRight;
        const totalHeight = this.displayFrameHeight + this.paddingTop  + this.paddingBottom;
        frameCanvas.width  = totalWidth;
        frameCanvas.height = totalHeight;
        const ctx = frameCanvas.getContext('2d');
        ctx.clearRect(0, 0, totalWidth, totalHeight);

        const { dx, dy } = this.getFrameOffset(i, posMap.has(i) ? posMap.get(i) : -1);
        const destX = this.paddingLeft - dx;
        const destY = this.paddingTop  - dy;

        if (this.removeBackground && this.processedFrames.has(i)) {
          const processedBlob = this.processedFrames.get(i);
          const url = URL.createObjectURL(processedBlob);
          const img = new Image();
          img.onload = () => {
            if (this.backgroundColor !== 'transparent') {
              ctx.fillStyle = this.backgroundColor === 'black' ? '#000000'
                : this.backgroundColor === 'white' ? '#ffffff'
                : this.backgroundColor;
              ctx.fillRect(0, 0, totalWidth, totalHeight);
            }
            ctx.drawImage(img, 0, 0, this.displayFrameWidth, this.displayFrameHeight, destX, destY, this.displayFrameWidth, this.displayFrameHeight);
            URL.revokeObjectURL(url);
          };
          img.src = url;
        } else {
          const img = new Image();
          img.onload = () => {
            ctx.drawImage(img, 0, 0, this.frameWidth, this.frameHeight, destX, destY, this.displayFrameWidth, this.displayFrameHeight);
          };
          img.src = frameData;
        }

        const frameNumber = document.createElement('div');
        frameNumber.className = 'frame-number';
        frameNumber.textContent = i + 1;

        frameDiv.appendChild(frameCanvas);
        frameDiv.appendChild(frameNumber);
        frameDiv.addEventListener('click', () => this.toggleFrame(i, frameDiv));
        this.framesGrid.appendChild(frameDiv);
      });
    }

    toggleFrame(frameIndex, frameDiv) {
      const wasEmpty = this.selectedFrames.size === 0;
      if (this.selectedFrames.has(frameIndex)) {
        this.selectedFrames.delete(frameIndex);
        frameDiv.classList.replace('included', 'excluded');
      } else {
        this.selectedFrames.add(frameIndex);
        frameDiv.classList.replace('excluded', 'included');
      }
      this.updateStats();
      this.updateSlider();
      if (wasEmpty && this.selectedFrames.size > 0) {
        this.startAnimation();
      }
    }

    selectAll() {
      const totalFrames = this.mediaType === 'video' ? this.frames.length : (this.rows * this.columns);
      this.selectedFrames.clear();
      for (let i = 0; i < totalFrames; i++) this.selectedFrames.add(i);
      this.updateFrameVisuals();
      this.updateStats();
      this.updateSlider();
    }

    deselectAll() {
      this.selectedFrames.clear();
      this.updateFrameVisuals();
      this.updateStats();
      this.updateSlider();
    }

    updateFrameVisuals() {
      const frameItems = this.framesGrid.querySelectorAll('.frame-item');
      frameItems.forEach((item, index) => {
        if (this.selectedFrames.has(index)) {
          item.classList.add('included');
          item.classList.remove('excluded');
        } else {
          item.classList.remove('included');
          item.classList.add('excluded');
        }
      });
    }

    updateSlider() {
      const selectedArray = Array.from(this.selectedFrames).sort((a, b) => a - b);
      this.frameSlider.max = Math.max(0, selectedArray.length - 1);
      this.frameSlider.value = 0;
      this.currentFrame = 0;
      this.lastRenderedFrame = -1;
    }

    updateStats() {
      const totalFrames = this.mediaType === 'video' ? this.frames.length : (this.rows * this.columns);
      const selectedCount = this.selectedFrames.size;
      const duration = selectedCount > 0 ? (selectedCount / this.animationFps).toFixed(2) : 0;
      this.totalFramesDisplay.textContent = totalFrames;
      this.selectedFramesDisplay.textContent = selectedCount;
      this.animDurationDisplay.textContent = duration + 's';
      this.exportBtn.disabled = selectedCount === 0;
    }

    updatePreviewTitle() {
      const selectedArray = Array.from(this.selectedFrames).sort((a, b) => a - b);
      if (selectedArray.length === 0) {
        this.previewTitle.textContent = 'Animation Preview';
        return;
      }
      const safeFrame = Math.min(this.currentFrame, selectedArray.length - 1);
      const frameIndex = selectedArray[safeFrame];
      this.previewTitle.textContent = `Animation Preview - Frame ${safeFrame + 1}/${selectedArray.length} (Frame selection: ${frameIndex + 1})`;
    }

    onSliderDragStart() {
      this.isSliderDragging = true;
      this.animationRunning = false;
    }

    onSliderInput(e) {
      const selectedArray = Array.from(this.selectedFrames).sort((a, b) => a - b);
      if (selectedArray.length === 0) return;
      this.currentFrame = Math.min(parseInt(this.frameSlider.value), selectedArray.length - 1);
      this.updatePreviewTitle();
      this.needsRender = true;
    }

    onSliderDragEnd() {
      this.isSliderDragging = false;
      this.startAnimation();
    }

    startAnimation() {
      if (this.isSliderDragging) return;
      this.animationRunning = true;
      this.lastFrameTime = Date.now();
      this.currentFrame = 0;
      this.lastRenderedFrame = -1;
    }

    startAnimationLoop() {
      const loop = () => {
        requestAnimationFrame(loop);
        if (this.isRendering) return;

        if (this.needsRender) {
          const selectedArray = Array.from(this.selectedFrames).sort((a, b) => a - b);
          if (selectedArray.length > 0) {
            this.isRendering = true;
            this.renderPreview(selectedArray).finally(() => { this.isRendering = false; });
          }
          this.needsRender = false;
          return;
        }

        if (!this.animationRunning || this.isSliderDragging) return;

        const now = Date.now();
        const elapsed = (now - this.lastFrameTime) / 1000;
        if (elapsed >= 1 / this.animationFps) {
          this.currentFrame++;
          const selectedArray = Array.from(this.selectedFrames).sort((a, b) => a - b);
          if (selectedArray.length === 0) { this.animationRunning = false; return; }
          if (this.currentFrame >= selectedArray.length) this.currentFrame = 0;
          if (this.lastRenderedFrame !== this.currentFrame) {
            this.lastRenderedFrame = this.currentFrame;
            this.updatePreviewTitle();
            this.isRendering = true;
            this.renderPreview(selectedArray).finally(() => { this.isRendering = false; });
            this.frameSlider.value = this.currentFrame;
          }
          this.lastFrameTime = now;
        }
      };
      requestAnimationFrame(loop);
    }

    async renderPreview(selectedFrames = null) {
      if (!selectedFrames) {
        selectedFrames = Array.from(this.selectedFrames).sort((a, b) => a - b);
      }

      if ((this.mediaType === 'image' && !this.media) ||
          (this.mediaType === 'video' && this.frames.length === 0) ||
          selectedFrames.length === 0) {
        this.previewCanvas.width = 200;
        this.previewCanvas.height = 200;
        this.previewCtx.fillStyle = '#333';
        this.previewCtx.fillRect(0, 0, 200, 200);
        return;
      }

      const currentFrame = Math.min(this.currentFrame, selectedFrames.length - 1);
      const frameIndex = selectedFrames[currentFrame];
      if (frameIndex === undefined) return;

      const totalWidth  = this.displayFrameWidth  + this.paddingLeft + this.paddingRight;
      const totalHeight = this.displayFrameHeight + this.paddingTop  + this.paddingBottom;
      if (totalWidth <= 0 || totalHeight <= 0) return;

      if (!this.offscreenCanvas) {
        this.offscreenCanvas = document.createElement('canvas');
        this.offscreenCtx = this.offscreenCanvas.getContext('2d');
      }
      if (this.offscreenCanvas.width !== totalWidth || this.offscreenCanvas.height !== totalHeight) {
        this.offscreenCanvas.width  = totalWidth;
        this.offscreenCanvas.height = totalHeight;
      }
      this.offscreenCtx.clearRect(0, 0, totalWidth, totalHeight);

      // currentFrame is the position in selectedFrames (0-based), frameIndex is the original index
      const { dx, dy } = this.getFrameOffset(frameIndex, currentFrame);
      const destX = this.paddingLeft - dx;
      const destY = this.paddingTop  - dy;

      if (this.removeBackground && this.processedFrames.has(frameIndex)) {
        const processedCanvas = await this.getProcessedFrameCanvas(frameIndex);
        if (processedCanvas) {
          if (this.backgroundColor !== 'transparent') {
            this.offscreenCtx.fillStyle = this.backgroundColor === 'black' ? '#000000'
              : this.backgroundColor === 'white' ? '#ffffff'
              : this.backgroundColor;
            this.offscreenCtx.fillRect(0, 0, totalWidth, totalHeight);
          }
          this.offscreenCtx.drawImage(processedCanvas, destX, destY);
          this.blitToPreview(totalWidth, totalHeight);
          return;
        }
      }

      if (this.mediaType === 'image') {
        const row = Math.floor(frameIndex / this.columns);
        const col = frameIndex % this.columns;
        this.offscreenCtx.drawImage(this.media, col * this.frameWidth, row * this.frameHeight, this.frameWidth, this.frameHeight, destX, destY, this.displayFrameWidth, this.displayFrameHeight);
      } else if (this.mediaType === 'video') {
        const img = await this.getVideoFrameImage(frameIndex);
        if (img) {
          this.offscreenCtx.drawImage(img, 0, 0, this.frameWidth, this.frameHeight, destX, destY, this.displayFrameWidth, this.displayFrameHeight);
        }
      }

      this.blitToPreview(totalWidth, totalHeight);
    }

    blitToPreview(width, height) {
      if (this.previewCanvas.width !== width || this.previewCanvas.height !== height) {
        this.previewCanvas.width  = width;
        this.previewCanvas.height = height;
      }
      this.previewCtx.clearRect(0, 0, width, height);
      this.previewCtx.drawImage(this.offscreenCanvas, 0, 0);
    }

    calculateOptimalGrid(frameCount) {
      if (frameCount <= 0) return { rows: 1, cols: 1 };
      const cols = Math.ceil(Math.sqrt(frameCount));
      const rows = Math.ceil(frameCount / cols);
      return { rows, cols };
    }

    exportSprites() {
      if (this.selectedFrames.size === 0) {
        this.showMessage('Please select at least one frame to export', 'error');
        return;
      }

      const selectedArray = Array.from(this.selectedFrames).sort((a, b) => a - b);
      const { rows: exportRows, cols: exportCols } = this.calculateOptimalGrid(selectedArray.length);
      const totalWidth  = this.displayFrameWidth  + this.paddingLeft + this.paddingRight;
      const totalHeight = this.displayFrameHeight + this.paddingTop  + this.paddingBottom;

      const exportCanvas = document.createElement('canvas');
      exportCanvas.width  = Math.max(1, totalWidth  * exportCols);
      exportCanvas.height = Math.max(1, totalHeight * exportRows);
      const exportCtx = exportCanvas.getContext('2d');

      if (this.mediaType === 'image') {
        this.exportImageSprites(exportCanvas, exportCtx, selectedArray, exportRows, exportCols, totalWidth, totalHeight);
      } else if (this.mediaType === 'video') {
        this.exportVideoSprites(exportCanvas, exportCtx, selectedArray, exportRows, exportCols, totalWidth, totalHeight);
      }
    }

    async exportImageSprites(exportCanvas, exportCtx, selectedArray, exportRows, exportCols, totalWidth, totalHeight) {
      for (let index = 0; index < selectedArray.length; index++) {
        const frameIndex = selectedArray[index];
        const row = Math.floor(frameIndex / this.columns);
        const col = frameIndex % this.columns;
        const exportRow = Math.floor(index / exportCols);
        const exportCol = index % exportCols;

        const { dx, dy } = this.getFrameOffset(frameIndex, index);
        const destX = this.paddingLeft - dx;
        const destY = this.paddingTop  - dy;

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width  = Math.max(1, totalWidth);
        tempCanvas.height = Math.max(1, totalHeight);
        const tempCtx = tempCanvas.getContext('2d');

        if (this.removeBackground && this.processedFrames.has(frameIndex)) {
          const url = URL.createObjectURL(this.processedFrames.get(frameIndex));
          await new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
              if (this.backgroundColor !== 'transparent') {
                tempCtx.fillStyle = this.backgroundColor === 'black' ? '#000000'
                  : this.backgroundColor === 'white' ? '#ffffff'
                  : this.backgroundColor;
                tempCtx.fillRect(0, 0, totalWidth, totalHeight);
              }
              tempCtx.drawImage(img, 0, 0, this.displayFrameWidth, this.displayFrameHeight, destX, destY, this.displayFrameWidth, this.displayFrameHeight);
              URL.revokeObjectURL(url);
              resolve();
            };
            img.onerror = () => { URL.revokeObjectURL(url); resolve(); };
            img.src = url;
          });
        } else {
          tempCtx.drawImage(this.media, col * this.frameWidth, row * this.frameHeight, this.frameWidth, this.frameHeight, destX, destY, this.displayFrameWidth, this.displayFrameHeight);
        }
        exportCtx.drawImage(tempCanvas, exportCol * totalWidth, exportRow * totalHeight);
      }
      this.downloadCanvas(exportCanvas, exportRows, exportCols);
    }

    async exportVideoSprites(exportCanvas, exportCtx, selectedArray, exportRows, exportCols, totalWidth, totalHeight) {
      for (let index = 0; index < selectedArray.length; index++) {
        const frameIndex = selectedArray[index];
        const exportRow = Math.floor(index / exportCols);
        const exportCol = index % exportCols;
        const img = await this.getVideoFrameImage(frameIndex);
        if (!img) continue;

        const { dx, dy } = this.getFrameOffset(frameIndex, index);
        const destX = this.paddingLeft - dx;
        const destY = this.paddingTop  - dy;

        const tempCanvas = document.createElement('canvas');
        tempCanvas.width  = Math.max(1, totalWidth);
        tempCanvas.height = Math.max(1, totalHeight);
        const tempCtx = tempCanvas.getContext('2d');

        if (this.removeBackground && this.processedFrames.has(frameIndex)) {
          const url = URL.createObjectURL(this.processedFrames.get(frameIndex));
          await new Promise((resolve) => {
            const processedImg = new Image();
            processedImg.onload = () => {
              if (this.backgroundColor !== 'transparent') {
                tempCtx.fillStyle = this.backgroundColor === 'black' ? '#000000'
                  : this.backgroundColor === 'white' ? '#ffffff'
                  : this.backgroundColor;
                tempCtx.fillRect(0, 0, totalWidth, totalHeight);
              }
              tempCtx.drawImage(processedImg, 0, 0, this.displayFrameWidth, this.displayFrameHeight, destX, destY, this.displayFrameWidth, this.displayFrameHeight);
              URL.revokeObjectURL(url);
              resolve();
            };
            processedImg.onerror = () => { URL.revokeObjectURL(url); resolve(); };
            processedImg.src = url;
          });
        } else {
          tempCtx.drawImage(img, 0, 0, this.frameWidth, this.frameHeight, destX, destY, this.displayFrameWidth, this.displayFrameHeight);
        }
        exportCtx.drawImage(tempCanvas, exportCol * totalWidth, exportRow * totalHeight);
      }
      this.downloadCanvas(exportCanvas, exportRows, exportCols);
    }

    downloadCanvas(canvas, rows, cols) {
      canvas.toBlob((blob) => {
        if (!blob) { this.showMessage('Failed to create export image', 'error'); return; }
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `exported-sprites-${rows}x${cols}.png`;
        link.click();
        URL.revokeObjectURL(url);
        this.showMessage(`Sprites exported successfully as ${rows}x${cols} grid!`, 'success');
      }, 'image/png');
    }

    showMessage(text, type) {
      this.statusMessage.textContent = text;
      this.statusMessage.className = `status-message show ${type}`;
      setTimeout(() => { this.statusMessage.classList.remove('show'); }, 3000);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    new SpriteSheetEditor();
  });
</script>
